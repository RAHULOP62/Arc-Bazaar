<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcRelay | Professional Web3 Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); sticky top-0; z-index: 50; border-bottom: 1px solid #e2e8f0; }
        .item-card { transition: transform 0.3s ease, box-shadow 0.3s ease; border-radius: 2rem; overflow: hidden; background: white; border: 1px solid #f1f5f9; }
        .item-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .btn-buy { background-color: #0f172a; color: white; transition: all 0.2s; }
        .btn-buy:hover { background-color: #1e293b; transform: scale(1.05); }
        .btn-buy:active { transform: scale(0.95); }
        .sold-out { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <!-- Header -->
    <nav class="glass-nav sticky top-0 h-20">
        <div class="container mx-auto px-6 h-full flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <span class="text-xl font-extrabold text-slate-900 tracking-tight">ArcRelay</span>
            </div>
            <button id="walletBtn" onclick="connectWallet()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-2xl font-bold text-sm shadow-md hover:bg-indigo-700 transition-all">
                Connect Wallet
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12">
        
        <!-- Section Header -->
        <div class="mb-12">
            <h2 class="text-3xl font-extrabold text-slate-900">Explore Market</h2>
            <p class="text-slate-500 mt-2">Verified second-hand items on Arc Testnet</p>
        </div>

        <!-- Items Grid (Showing 10 Items) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="marketGrid">
            
            <!-- Item 1 -->
            <div class="item-card p-4 flex flex-col">
                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=500&q=80" class="rounded-[1.5rem] aspect-square object-cover mb-4">
                <h3 class="font-bold text-lg text-slate-800">iPhone 12</h3>
                <p class="text-slate-400 text-xs mb-6">Excellent condition, 64GB, Blue.</p>
                <div class="mt-auto flex justify-between items-center">
                    <span class="font-black text-xl text-slate-900">300 <span class="text-xs text-slate-400">USDC</span></span>
                    <button onclick="buyItem(this, 'iPhone 12', 300)" class="btn-buy px-6 py-2 rounded-xl font-bold text-sm">Buy</button>
                </div>
            </div>

            <!-- Item 2 -->
            <div class="item-card p-4 flex flex-col">
                <img src="https://images.unsplash.com/photo-1592078615290-033ee584e267?auto=format&fit=crop&w=500&q=80" class="rounded-[1.5rem] aspect-square object-cover mb-4">
                <h3 class="font-bold text-lg text-slate-800">Wooden Chair</h3>
                <p class="text-slate-400 text-xs mb-6">Minimalist design, solid oak wood.</p>
                <div class="mt-auto flex justify-between items-center">
                    <span class="font-black text-xl text-slate-900">50 <span class="text-xs text-slate-400">USDC</span></span>
                    <button onclick="buyItem(this, 'Wooden Chair', 50)" class="btn-buy px-6 py-2 rounded-xl font-bold text-sm">Buy</button>
                </div>
            </div>

            <!-- Item 3 -->
            <div class="item-card p-4 flex flex-col">
                <img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=500&q=80" class="rounded-[1.5rem] aspect-square object-cover mb-4">
                <h3 class="font-bold text-lg text-slate-800">MacBook Pro</h3>
                <p class="text-slate-400 text-xs mb-6">M1 Chip, 8GB RAM, Space Gray.</p>
                <div class="mt-auto flex justify-between items-center">
                    <span class="font-black text-xl text-slate-900">850 <span class="text-xs text-slate-400">USDC</span></span>
                    <button onclick="buyItem(this, 'MacBook Pro', 850)" class="btn-buy px-6 py-2 rounded-xl font-bold text-sm">Buy</button>
                </div>
            </div>

            <!-- More items generated via JS for the demo -->
        </div>
    </main>

    <script>
        let userAddress = null;

        // 1. Connect Wallet Logic
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];
                    const btn = document.getElementById('walletBtn');
                    btn.innerText = userAddress.substring(0, 6) + '...' + userAddress.substring(38);
                    btn.classList.replace('bg-indigo-600', 'bg-emerald-500');
                    console.log("Connected:", userAddress);
                } catch (err) {
                    alert("Connection rejected");
                }
            } else {
                alert("Please install MetaMask!");
            }
        }

        // 2. Functional Buy Logic
        async function buyItem(button, name, price) {
            if (!userAddress) {
                alert("Please connect your wallet first!");
                return;
            }

            // UI Feedback
            const originalText = button.innerText;
            button.innerText = "Processing...";
            button.disabled = true;

            try {
                // Simulate a transaction on Arc Testnet
                // In a real app, you would call: await contract.buyItem(itemId)
                alert(`Initiating purchase for ${name} for ${price} USDC... Check your MetaMask.`);
                
                // Simulating 2 second blockchain delay
                setTimeout(() => {
                    button.innerText = "Sold";
                    button.classList.replace('bg-slate-900', 'bg-slate-200');
                    button.classList.add('text-slate-500', 'cursor-not-allowed');
                    button.closest('.item-card').classList.add('sold-out');
                    alert(`Success! ${name} is now yours. Transaction confirmed on Arc Testnet.`);
                }, 2000);

            } catch (error) {
                alert("Transaction failed!");
                button.innerText = originalText;
                button.disabled = false;
            }
        }

        // Add remaining items to make it 10
        const extraItems = [
            { name: "Camera Lens", price: 120, img: "https://images.unsplash.com/photo-1516724562728-afc824a36e84?w=500" },
            { name: "Coffee Table", price: 40, img: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=500" },
            { name: "Headphones", price: 190, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" },
            { name: "Bicycle", price: 210, img: "https://images.unsplash.com/photo-1485965120184-e220f721d03e?w=500" },
            { name: "Smart Watch", price: 75, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" },
            { name: "Leather Bag", price: 60, img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500" },
            { name: "Desk Lamp", price: 15, img: "https://images.unsplash.com/photo-1534073828943-f801091bb18c?w=500" }
        ];

        const grid = document.getElementById('marketGrid');
        extraItems.forEach(item => {
            grid.innerHTML += `
                <div class="item-card p-4 flex flex-col">
                    <img src="${item.img}" class="rounded-[1.5rem] aspect-square object-cover mb-4">
                    <h3 class="font-bold text-lg text-slate-800">${item.name}</h3>
                    <p class="text-slate-400 text-xs mb-6">Pre-owned, verified quality.</p>
                    <div class="mt-auto flex justify-between items-center">
                        <span class="font-black text-xl text-slate-900">${item.price} <span class="text-xs text-slate-400">USDC</span></span>
                        <button onclick="buyItem(this, '${item.name}', ${item.price})" class="btn-buy px-6 py-2 rounded-xl font-bold text-sm">Buy</button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
