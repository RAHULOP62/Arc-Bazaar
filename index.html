<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcRelay Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ethers.js v6 Library -->
    <script src="https://io.files.circle.com/web3/ethers.v6.min.js"></script>
    <style>
        .item-card { transition: all 0.3s ease; }
        .item-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">ArcRelay</h1>
            <button id="walletBtn" onclick="connectWallet()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-md">
                Connect Wallet
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <h2 class="text-3xl font-extrabold mb-8">Explore Market</h2>

        <!-- Market Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Item 1 -->
            <div class="item-card bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <div class="w-full h-48 bg-slate-200 rounded-2xl mb-4 overflow-hidden flex items-center justify-center text-slate-400">
                    <span class="text-lg">iPhone 12</span>
                </div>
                <h3 class="text-xl font-bold mb-1">iPhone 12</h3>
                <p class="text-slate-500 text-sm mb-4">Arc Testnet Certified Device</p>
                <div class="flex items-center justify-between">
                    <span class="text-xl font-black text-indigo-600">0.001 USDC</span>
                    <button onclick="buyItem(this, 'iPhone 12', 0.001)" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-sm hover:scale-105 transition-transform active:scale-95">
                        Buy Now
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Arc Testnet Config
        const ARC_CONFIG = {
            chainId: '0x1F4', // 500
            USDC: "0x3600000000000000000000000000000000000000",
            RPC: "https://rpc-testnet.arc.io"
        };

        const USDC_ABI = ["function transfer(address to, uint256 amount) returns (bool)"];
        let userAddress = null;

        async function connectWallet() {
            if (!window.ethereum) return alert("MetaMask install karein!");
            
            try {
                // Network check
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                if (chainId !== ARC_CONFIG.chainId) {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: ARC_CONFIG.chainId }],
                    });
                }

                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                document.getElementById('walletBtn').innerText = `${userAddress.substring(0,6)}...${userAddress.slice(-4)}`;
                return true;
            } catch (err) {
                console.error(err);
                alert("Connection failed: " + err.message);
                return false;
            }
        }

        async function buyItem(button, itemName, price) {
            // 1. Ensure Connected
            if (!userAddress) {
                const connected = await connectWallet();
                if (!connected) return;
            }

            const originalText = button.innerText;

            try {
                // UI State
                button.innerText = "Check Wallet...";
                button.disabled = true;

                // 2. Setup Ethers
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();

                // 3. Contract Instance
                const usdc = new ethers.Contract(ARC_CONFIG.USDC, USDC_ABI, signer);

                // 4. Amount Fix (Arc USDC Interface uses 6 decimals)
                const amount = ethers.parseUnits(price.toString(), 6);
                const receiver = "0x867650F5eAe8df91445971f14d89fd84F0C9a9f8";

                // 5. TRIGGER TRANSACTION POPUP
                console.log("Requesting transaction...");
                const tx = await usdc.transfer(receiver, amount);

                // Agar yahan tak code aaya hai, matlab user ne 'Confirm' kar diya
                button.innerText = "Processing...";
                
                // 6. Wait for Confirmation
                const receipt = await tx.wait();

                if (receipt.status === 1) {
                    // Success alert (Matches image_cce449.png)
                    alert(`Success! ${itemName} is now yours. Transaction confirmed on Arc Testnet.`);
                    
                    button.innerText = "Sold";
                    button.classList.replace('bg-slate-900', 'bg-slate-200');
                    button.classList.add('text-slate-500');
                    button.onclick = null;
                } else {
                    throw new Error("Transaction failed on chain.");
                }

            } catch (error) {
                console.error("TX Error:", error);
                
                // Detailed Error Handling
                if (error.code === 'ACTION_REJECTED' || error.code === 4001) {
                    alert("User ne transaction reject kar di.");
                } else {
                    alert("Error: Transaction trigger nahi hui. Balance check karein (Gas ke liye USDC chahiye).");
                }

                button.innerText = originalText;
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
